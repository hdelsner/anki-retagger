const BASE_STOP_WORDS=new Set(['a','an','the','and','or','but','in','on','at','to','for','of','with','by','from','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','shall','can','this','that','these','those','it','its','they','their','them','he','she','we','you','i','my','your','our','his','her','what','which','who','how','when','where','why','all','as','if','so','than','then','there','here','about','into','through','during','before','after','above','below','between','each','other','such','no','not','only','same','also','just','more','most','over','under','again','further','both','few','some','any','every','used','using','within','without','however','therefore','because','since','while','although','though','whether','either','neither','among','including','following','across','behind','beyond','plus','except','up','out','around','down','off','near','slide','page','figure','table','lecture','notes','section','chapter','part','unit','module','class','course','study','review','term','word','type','form','make','made','take','taken','give','given','show','shown','see','seen','know','known','find','found','come','came','think','thought','call','called','need','needed','include','included','describe','described','however','therefore','thus','hence','whereas','whereby','wherein','upon','onto','into','via','per','versus','etc','ie','eg']);

function buildCorpusFilter(cards, threshold=0.05){
  // Count how many cards each word appears in
  const wordCardCount={};
  const total=cards.length;
  cards.forEach(c=>{
    const text=(c.front+' '+c.back).toLowerCase().replace(/[^a-z0-9\s]/g,' ');
    const words=new Set(text.split(/\s+/).filter(w=>w.length>3));
    words.forEach(w=>{wordCardCount[w]=(wordCardCount[w]||0)+1});
  });
  // Words appearing in more than threshold% of cards are too generic
  const genericWords=new Set();
  Object.entries(wordCardCount).forEach(([word,count])=>{
    if(count/total>threshold) genericWords.add(word);
  });
  return genericWords;
}

function extractKeywords(text, genericWords=new Set()){
  const words=text.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/);
  // Count frequency in this document
  const freq={};
  words.forEach(w=>{if(w.length>3) freq[w]=(freq[w]||0)+1});
  // Keep words that: appear 2+ times, aren't in base stop words, aren't generic across cards
  return [...new Set(
    Object.entries(freq)
      .filter(([w,count])=>count>=2&&!BASE_STOP_WORDS.has(w)&&!genericWords.has(w))
      .sort((a,b)=>b[1]-a[1])
      .map(([w])=>w)
  )];
}

function estimateCost(candidateCount){
  return (Math.ceil(candidateCount/100)*0.035).toFixed(2);
}

async function extractTextFromPDF(file){
  const arrayBuffer=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(item=>item.str).join(' ')+'\n';
  }
  return text;
}

async function extractTextFromDocx(file){
  const arrayBuffer=await file.arrayBuffer();
  const result=await mammoth.extractRawText({arrayBuffer});
  return result.value;
}

function CardDropZone({onCardsLoaded}){
  const [over,setOver]=useState(false);
  const [status,setStatus]=useState('');
  const [loading,setLoading]=useState(false);
  const inputRef=useRef();

  async function handleFile(file){
    if(!file||!file.name.toLowerCase().endsWith('.txt')){
      alert('Please upload a .txt file exported from Anki.');
      return;
    }
    setLoading(true);
    setStatus('Reading file...');
    try{
      const text=await file.text();
      const allLines=text.trim().split('\n');
      const headerLines=allLines.filter(l=>l.startsWith('#'));
      const guidHeader=headerLines.find(l=>l.startsWith('#guid column:'));
      const hasGuid=!!guidHeader;
      const dataLines=allLines.filter(l=>l.trim()&&!l.startsWith('#'));

      setStatus(`Parsing ${dataLines.length.toLocaleString()} notes...`);
      await new Promise(r=>setTimeout(r,50));

      const parsed=dataLines.map((line,i)=>{
        const firstTabIdx=line.indexOf('\t');
        if(firstTabIdx===-1) return null;
        if(hasGuid){
          // GUID is first field, front is second field
          const noteId=line.substring(0,firstTabIdx).trim().replace(/^"|"$/g,'');
          const rest=line.substring(firstTabIdx+1);
          const secondTabIdx=rest.indexOf('\t');
          const front=secondTabIdx!==-1?rest.substring(0,secondTabIdx).trim():rest.trim();
          return{anki_id:`card_${i}`,note_id:noteId,front,back:'',existing_tags:''};
        } else {
          // No GUID, front is first field
          const front=line.substring(0,firstTabIdx).trim();
          return{anki_id:`card_${i}`,note_id:'',front,back:'',existing_tags:''};
        }
      }).filter(c=>c&&c.front.trim());

      setStatus(`Uploading ${parsed.length.toLocaleString()} cards...`);
      await new Promise(r=>setTimeout(r,50));
      const BATCH=100;
      for(let i=0;i<parsed.length;i+=BATCH){
        await db.from('cards').upsert(parsed.slice(i,i+BATCH),{onConflict:'anki_id',ignoreDuplicates:false});
        if(i%2000===0&&i>0) setStatus(`Uploaded ${i.toLocaleString()} of ${parsed.length.toLocaleString()}...`);
      }
      setStatus(`Done — ${parsed.length.toLocaleString()} cards imported.`);
      onCardsLoaded(parsed.length);
    }catch(e){
      setStatus('Error: '+e.message);
    }
    setLoading(false);
  }

  return(
    <div>
      <div
        class={`drop-zone${over?' over':''}`}
        onClick={()=>inputRef.current.click()}
        onDragOver={e=>{e.preventDefault();setOver(true)}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);handleFile(e.dataTransfer.files[0])}}
      >
        <i class={loading?'ti ti-loader':'ti ti-file-text'}/>
        {loading
          ?<p style={{fontSize:13,color:'var(--txt2)'}}>{status}</p>
          :<>
            <p style={{fontSize:13,color:'var(--txt2)',fontWeight:500}}>Drop your Anki export .txt file here</p>
            <p style={{fontSize:12,color:'var(--txt2)',marginTop:2}}>or click to browse</p>
          </>
        }
      </div>
      {!loading&&status&&<p style={{color:status.startsWith('Error')?'var(--err)':'var(--ok)',fontSize:13,marginTop:'0.5rem'}}><i class={status.startsWith('Error')?'ti ti-alert-circle':'ti ti-check'}/> {status}</p>}
      <input ref={inputRef} type="file" accept=".txt" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
    </div>
  );
}

function FileUploadZone({onTextExtracted}){
  const [over,setOver]=useState(false);
  const [processing,setProcessing]=useState(false);
  const [processStatus,setProcessStatus]=useState('');
  const inputRef=useRef();

  async function handleFiles(fileList){
    const files=Array.from(fileList).filter(f=>{
      const n=f.name.toLowerCase();
      return n.endsWith('.pdf')||n.endsWith('.docx')||n.endsWith('.doc');
    });
    if(files.length===0){alert('Please upload PDF or Word (.docx) files only.');return;}
    setProcessing(true);
    for(let i=0;i<files.length;i++){
      const file=files[i];
      setProcessStatus(`Reading ${file.name} (${i+1} of ${files.length})...`);
      try{
        let text='';
        if(file.name.toLowerCase().endsWith('.pdf')){
          text=await extractTextFromPDF(file);
        } else {
          text=await extractTextFromDocx(file);
        }
        await onTextExtracted(text,file.name);
      }catch(e){
        setProcessStatus(`Error reading ${file.name}: ${e.message}`);
      }
    }
    setProcessStatus(`Done — ${files.length} file${files.length>1?'s':''} processed.`);
    setProcessing(false);
    setTimeout(()=>setProcessStatus(''),4000);
  }

  return(
    <div>
      <div
        class={`drop-zone${over?' over':''}`}
        onClick={()=>inputRef.current.click()}
        onDragOver={e=>{e.preventDefault();setOver(true)}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);handleFiles(e.dataTransfer.files)}}
      >
        <i class={processing?'ti ti-loader':'ti ti-file-upload'}/>
        {processing
          ?<p style={{fontSize:13,color:'var(--txt2)'}}>{processStatus}</p>
          :<>
            <p style={{fontSize:13,color:'var(--txt2)',fontWeight:500}}>Drop lecture PDFs and Word docs here</p>
            <p style={{fontSize:12,color:'var(--txt2)',marginTop:2}}>Multiple files supported · .pdf and .docx · click to browse</p>
          </>
        }
      </div>
      {!processing&&processStatus&&<p style={{color:'var(--ok)',fontSize:13,marginTop:'0.5rem'}}><i class="ti ti-check"/> {processStatus}</p>}
      <input ref={inputRef} type="file" accept=".pdf,.docx,.doc" multiple style={{display:'none'}} onChange={e=>handleFiles(e.target.files)}/>
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState('setup');
  const [reviewer,setReviewer]=useState('');
  const [apiKey,setApiKey]=useState('');
  const [lectures,setLectures]=useState([]);
  const [cards,setCards]=useState([]);
  const [completions,setCompletions]=useState({});
  const [lectureReviewCounts,setLectureReviewCounts]=useState({});
  const [genericWords,setGenericWords]=useState(new Set());

  const [loadingCards,setLoadingCards]=useState(false);

  async function loadAll(){
    setLoadingCards(true);
    const [{data:lecs},{data:comps},{data:revCounts}]=await Promise.all([
      db.from('lectures').select('*').order('module').order('name'),
      db.from('lecture_completions').select('*'),
      db.from('reviews').select('lecture_id')
    ]);
    // Fetch all cards using explicit high limit
    // Fetch all cards in batches of 1000 to avoid statement timeout
    let allCards=[];
    let from=0;
    while(true){
      const{data:batch,error:batchError}=await db.from('cards').select('*').range(from,from+999);
      if(batchError){console.error('Card batch error:',JSON.stringify(batchError));break;}
      if(!batch||batch.length===0) break;
      allCards=[...allCards,...batch];
      if(batch.length<1000) break;
      from+=1000;
    }
    console.log('Cards loaded:', allCards.length);
    setLectures(lecs||[]);
    setCards(allCards);
    const cm={};(comps||[]).forEach(c=>{cm[c.lecture_id]=c});setCompletions(cm);
    const rc={};(revCounts||[]).forEach(r=>{rc[r.lecture_id]=(rc[r.lecture_id]||0)+1});setLectureReviewCounts(rc);
    if(allCards.length>0){
      const gw=buildCorpusFilter(allCards,0.01);
      setGenericWords(gw);
    }
    setLoadingCards(false);
  }

  function getLectureStatus(lec){
    if(completions[lec.id]) return 'complete';
    if(lectureReviewCounts[lec.id]>0) return 'inprogress';
    return 'notstarted';
  }

  if(screen==='setup') return <Setup reviewer={reviewer} setReviewer={setReviewer} apiKey={apiKey} setApiKey={setApiKey} lectures={lectures} setLectures={setLectures} cards={cards} setCards={setCards} onContinue={()=>{loadAll();setScreen('review')}}/>;
  return <Review reviewer={reviewer} apiKey={apiKey} lectures={lectures} setLectures={setLectures} cards={cards} completions={completions} setCompletions={setCompletions} lectureReviewCounts={lectureReviewCounts} setLectureReviewCounts={setLectureReviewCounts} getLectureStatus={getLectureStatus} genericWords={genericWords} loadingCards={loadingCards} onBack={()=>setScreen('setup')}/>;
}

function Setup({reviewer,setReviewer,apiKey,setApiKey,lectures,setLectures,cards,setCards,onContinue}){
  const [tab,setTab]=useState('cards');
  const [lecName,setLecName]=useState('');
  const [modName,setModName]=useState('');
  const [bulkText,setBulkText]=useState('');
  const [cardCount,setCardCount]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [editName,setEditName]=useState('');
  const [editMod,setEditMod]=useState('');

  async function addLecture(name,mod){
    if(!name||!mod) return;
    const{data,error}=await db.from('lectures').insert({name,module:mod}).select().single();
    if(!error) setLectures(p=>[...p,data]);
  }

  async function bulkImport(){
    const lines=bulkText.trim().split('\n').filter(l=>l.trim());
    for(const line of lines){
      const[mod,...rest]=line.split('|').map(s=>s.trim());
      const name=rest.join('|').trim();
      if(mod&&name) await addLecture(name,mod);
    }
    setBulkText('');
  }

  async function handleCardsLoaded(count){
    setCardCount(count);
    const{data}=await db.from('cards').select('*');
    setCards(data||[]);
  }

  async function saveLectureEdit(id){
    if(!editName.trim()||!editMod.trim()) return;
    await db.from('lectures').update({name:editName,module:editMod}).eq('id',id);
    setLectures(p=>p.map(l=>l.id===id?{...l,name:editName,module:editMod}:l));
    setEditingId(null);
  }

  async function deleteLecture(id,name){
    if(!confirm(`Delete lecture "${name}"? This will also delete all reviews and keywords for this lecture.`)) return;
    await Promise.all([
      db.from('reviews').delete().eq('lecture_id',id),
      db.from('keywords').delete().eq('lecture_id',id),
      db.from('lecture_completions').delete().eq('lecture_id',id),
    ]);
    await db.from('lectures').delete().eq('id',id);
    setLectures(p=>p.filter(l=>l.id!==id));
  }

  return(
    <div style={{maxWidth:700,margin:'0 auto',padding:'2rem 1rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
        <div style={{width:32,height:32,background:'var(--acc)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <i class="ti ti-cards" style={{color:'#fff',fontSize:18}}/>
        </div>
        <h2>VPS Anki Retagger</h2>
        <span style={{marginLeft:'auto',fontSize:11,color:'var(--txt2)',background:'var(--bg3)',padding:'2px 8px',borderRadius:4}}>v86</span>
      </div>
      <p style={{color:'var(--txt2)',fontSize:13,marginBottom:'1.5rem',marginLeft:42}}>Configure your session before reviewing.</p>

      <div class="card" style={{marginBottom:'1rem'}}>
        <h3 style={{marginBottom:'1rem',fontSize:15}}>Your info</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
          <div class="field" style={{margin:0}}>
            <label>Your name</label>
            <input type="text" value={reviewer} onChange={e=>setReviewer(e.target.value)} placeholder="e.g. Henry"/>
          </div>
          <div class="field" style={{margin:0}}>
            <label>Anthropic API key</label>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/>
          </div>
        </div>
      </div>

      <div class="card" style={{marginBottom:'1rem'}}>
        <div style={{display:'flex',gap:'1.5rem',borderBottom:'0.5px solid var(--bdr)',marginBottom:'1rem',paddingBottom:'0.75rem'}}>
          {['cards','lectures'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{border:'none',background:'none',padding:'4px 0',fontWeight:tab===t?500:400,color:tab===t?'var(--acc)':'var(--txt2)',borderBottom:tab===t?'2px solid var(--acc)':'none',borderRadius:0}}>
              {t==='cards'?'Import cards':'Manage lectures'}
            </button>
          ))}
        </div>

        {tab==='cards'&&<>
          <p style={{color:'var(--txt2)',fontSize:13,marginBottom:'0.75rem'}}>In Anki: <strong>Notes → Export → Notes in Plain Text</strong>. Check <strong>"Include tags"</strong>, uncheck <strong>"Include media"</strong>. Drop the exported .txt file below.</p>
          <CardDropZone onCardsLoaded={handleCardsLoaded}/>
          {cardCount&&<p style={{color:'var(--ok)',fontSize:13,marginTop:'0.75rem'}}><i class="ti ti-database"/> {cardCount.toLocaleString()} cards imported.</p>}
          {!cardCount&&cards.length>0&&<p style={{color:'var(--txt2)',fontSize:13,marginTop:'0.75rem'}}><i class="ti ti-database"/> {cards.length.toLocaleString()} cards already in database.</p>}
        </>}

        {tab==='lectures'&&<>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:'8px',alignItems:'end',marginBottom:'1rem'}}>
            <div class="field" style={{margin:0}}>
              <label>Module</label>
              <input type="text" value={modName} onChange={e=>setModName(e.target.value)} placeholder="e.g. Nephrology"/>
            </div>
            <div class="field" style={{margin:0}}>
              <label>Lecture name</label>
              <input type="text" value={lecName} onChange={e=>setLecName(e.target.value)} placeholder="e.g. Starling Forces" onKeyDown={e=>{if(e.key==='Enter'){addLecture(lecName,modName);setLecName('')}}}/>
            </div>
            <button class="pri" onClick={()=>{addLecture(lecName,modName);setLecName('')}} disabled={!lecName||!modName}>
              <i class="ti ti-plus"/> Add
            </button>
          </div>
          <div class="field">
            <label>Or bulk import — one per line: Module | Lecture name</label>
            <textarea value={bulkText} onChange={e=>setBulkText(e.target.value)} rows={4} placeholder={"Nephrology | Starling Forces\nNephrology | AKI\nCardiology | Heart Failure"}/>
          </div>
          <button onClick={bulkImport} disabled={!bulkText.trim()}>Import list</button>

          {lectures.length>0&&<div style={{marginTop:'1rem'}}>

                      <input type="text" value={editName} onChange={e=>setEditName(e.target.value)} style={{flex:1,fontSize:12,padding:'4px 8px'}} onKeyDown={e=>{if(e.key==='Enter') saveLectureEdit(l.id)}}/>
                      <button onClick={()=>saveLectureEdit(l.id)} class="ok" style={{padding:'4px 8px',fontSize:12}}>Save</button>
                      <button onClick={()=>setEditingId(null)} style={{padding:'4px 8px',fontSize:12}}>Cancel</button>
                    </>
                  ):(
                    <>
                      <span style={{fontSize:11,color:'var(--txt2)',flex:'0 0 130px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.module}</span>
                      <span style={{fontSize:13,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</span>
                      <button onClick={()=>{setEditingId(l.id);setEditName(l.name);setEditMod(l.module)}} style={{padding:'3px 8px',fontSize:11,border:'none',background:'none',color:'var(--acc)'}}>
                        <i class="ti ti-pencil"/>

                        <i class="ti ti-trash"/>
                      </button>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>}
        </>}

      <button class="pri" onClick={onContinue} disabled={!reviewer} style={{width:'100%',padding:'10px'}}>
        Go to review session <i class="ti ti-arrow-right"/>
      </button>
    </div>
  );
}

function KeywordPanel({lecture,reviewer,cards,genericWords,apiKey,onCandidateCount,exclusionKeywords,onExclusionChange,onObjectivesChange,seededCount,candidateCount}){
  const [keywords,setKeywords]=useState([]);
  const [newKw,setNewKw]=useState('');
  const [newExKw,setNewExKw]=useState('');
  const [extractStatus,setExtractStatus]=useState('');
  const [objectives,setObjectives]=useState(lecture.learning_objectives||'');
  const [objSaved,setObjSaved]=useState(true);
  const apiKeyRef=useRef(apiKey);
  useEffect(()=>{apiKeyRef.current=apiKey;},[apiKey]);

  useEffect(()=>{setObjectives(lecture.learning_objectives||'');setObjSaved(true);},[lecture.id]);

  async function saveObjectives(){
    await db.from('lectures').update({learning_objectives:objectives}).eq('id',lecture.id);
    setObjSaved(true);
    if(onObjectivesChange) onObjectivesChange(lecture.id,objectives);
  }

  useEffect(()=>{loadKeywords();},[lecture.id]);

  useEffect(()=>{
    const seededIds=new Set();
    const lecTag=lecture.name.replace(/\s+/g,'_').toLowerCase();
    const seeded=cards.filter(c=>{
      const tags=(c.existing_tags||'').toLowerCase();
      return tags.includes(lecTag);
    });
    seeded.forEach(c=>seededIds.add(c.id));
    const kwList=keywords.map(k=>k.keyword.toLowerCase());
    const exList=(exclusionKeywords||[]).map(k=>k.keyword.toLowerCase());
    const candidates=cards.filter(c=>{
      if(seededIds.has(c.id)) return false;
      const text=(c.front+' '+c.back).toLowerCase();
      if(exList.some(ex=>text.includes(ex))) return false;
      return kwList.some(kw=>text.includes(kw));
    });
    onCandidateCount(seeded.length,candidates.length);
  },[keywords,exclusionKeywords,cards]);

  async function loadKeywords(){
    const{data}=await db.from('keywords').select('*').eq('lecture_id',lecture.id).order('added_at');
    setKeywords(data||[]);
  }

  async function addKeyword(kw){
    const clean=kw.trim().toLowerCase();
    if(!clean||keywords.find(k=>k.keyword===clean)) return;
    const{data,error}=await db.from('keywords').insert({lecture_id:lecture.id,keyword:clean,added_by:reviewer}).select().single();
    if(!error) setKeywords(p=>[...p,data]);
  }

  async function removeKeyword(id){
    await db.from('keywords').delete().eq('id',id);
    setKeywords(p=>p.filter(k=>k.id!==id));
  }

  async function clearAllKeywords(){
    if(!confirm(`Clear all ${keywords.length} keywords for this lecture?`)) return;
    await db.from('keywords').delete().eq('lecture_id',lecture.id);
    setKeywords([]);
  }

  const MEDICAL_STOP_WORDS=new Set(['enzyme','protein','cycle','synthesis','disease','deficiency','energy','storage','muscle','liver','brain','cell','cells','body','blood','tissue','organ','organs','acid','acids','amino','fatty','lipid','fats','membrane','matrix','pathway','pathways','process','processes','reaction','reactions','product','products','function','functions','level','levels','rate','rates','factor','factors','type','types','form','forms','role','mechanism','mechanisms','signal','signals','system','systems','complex','normal','elevated','increased','decreased','high','low','large','small','major','minor','primary','secondary','common','rare','specific','general','important','result','results','cause','causes','effect','effects','lead','leads','require','requires','involve','involves','produce','produces','occur','occurs','convert','converts','inhibit','inhibits','activate','activates','regulate','regulates','transport','transports','release','releases','absorb','absorbs','dietary','osmotic','hereditary','absorbed','apical','intestinal','matrix','branched','intermediate','intermediates','production','conversion','degradation','oxidation','starvation','anaerobic','treatment','structure','structures','molecule','molecules','substrate','substrates','precursor','precursors','inactive','active','excess','defect','defective','step','steps','phase','phases','less','hours','hour','history','synopsis','generate','generates','generated','inborn','metabolized','converted','incomplete','accumulate','accumulates','cannot','adds','break','breaks','affinity','flux','exported','transferred','increase','increases','gradient','activity','surface','enters','toxic','persistent','eating','export','carbon','sugars','linkages','becomes','different','idea','moves','milk','generators','diet','water','must','mono','sugar','produced','termini','branches','rather','many','uses','example','defects','note','post','food','basic','regular','slow','feed','converting','making','learn','learned','board','boards','test','state','finally','another','forms','large','high','major','specific','place','still','baby','avoid','child','juice','skip','takes','gets']);

  async function filterToMedicalTerms(kws, lectureName, lectureModule, apiKey){
    // First apply stop words filter
    const afterStopWords=kws.filter(w=>!MEDICAL_STOP_WORDS.has(w.toLowerCase()));
    if(!apiKey||afterStopWords.length===0) return afterStopWords;
    // Then use Claude to filter to lecture-specific medical terms
    try{
      const prompt=`You are filtering keywords extracted from a medical school lecture synopsis to use as Anki flashcard search terms.

LECTURE: "${lectureName}" (Module: ${lectureModule})

Candidate keywords:
${afterStopWords.join(', ')}

Keep ONLY keywords that are specific medical, biochemical, or scientific terms relevant to "${lectureName}".
Remove generic words, common verbs, adjectives, and terms too broad to be useful search terms.
Keep specific molecules, pathways, enzymes, conditions, transporters, and medical abbreviations.

JSON array of kept keywords only, no markdown, no explanation.`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
      });
      const data=await res.json();
      if(data.error){console.warn('Keyword filter error:',data.error.message);return afterStopWords;}
      const text=data.content?.[0]?.text||'[]';
      return JSON.parse(text.replace(/```json|```/g,'').trim());
    }catch(e){
      console.warn('Claude keyword filter failed, using stop words only:',e.message);
      return afterStopWords;
    }
  }

  async function handleFileExtract(text,filename){
    setExtractStatus(`Extracting keywords from ${filename}...`);
    const rawKws=extractKeywords(text,genericWords);
    setExtractStatus(`Filtering to medical terms (${rawKws.length} candidates)...`);
    const medicalKws=await filterToMedicalTerms(rawKws, lecture.name, lecture.module, apiKeyRef.current);
    let added=0;
    for(const kw of medicalKws){
      const clean=kw.trim().toLowerCase();
      if(!clean||keywords.find(k=>k.keyword===clean)) continue;
      const{error}=await db.from('keywords').insert({lecture_id:lecture.id,keyword:clean,added_by:'auto-extract'});
      if(!error) added++;
    }
    await loadKeywords();
    setExtractStatus(`Added ${added} keywords from ${filename} (${rawKws.length} extracted, ${medicalKws.length} after filtering)`);
    return added;
  }

  async function handleTextExtract(text){
    setExtractStatus('Extracting and filtering keywords...');
    const rawKws=extractKeywords(text,genericWords);
    const medicalKws=await filterToMedicalTerms(rawKws, lecture.name, lecture.module, apiKeyRef.current);
    for(const kw of medicalKws){
      const clean=kw.trim().toLowerCase();
      if(!clean||keywords.find(k=>k.keyword===clean)) continue;
      await db.from('keywords').insert({lecture_id:lecture.id,keyword:clean,added_by:'auto-extract'});
    }
    await loadKeywords();
    setExtractStatus(`Added ${medicalKws.length} medical keywords (filtered from ${rawKws.length} extracted)`);
  }

  return(
    <div>
      <div style={{marginBottom:'1rem'}}>
        <label style={{marginBottom:'0.5rem',display:'flex',alignItems:'center',gap:6}}>
          <i class="ti ti-target-arrow" style={{color:'var(--acc)'}}/>
          Learning objectives
          <span style={{fontSize:11,color:'var(--txt2)'}}>— helps Claude judge relevance during analysis</span>
        </label>
        <textarea
          value={objectives}
          onChange={e=>{setObjectives(e.target.value);setObjSaved(false);}}
          onBlur={saveObjectives}
          rows={4}
          placeholder="Paste the 4-6 learning objectives for this lecture..."
          style={{width:'100%',resize:'vertical'}}
        />
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:4}}>
          {objSaved
            ?<span style={{fontSize:11,color:'var(--ok)'}}><i class="ti ti-check"/> Saved</span>
            :<button onClick={saveObjectives} style={{padding:'4px 10px',fontSize:12}}>Save</button>
          }
        </div>
      </div>

      <div style={{marginBottom:'1rem'}}>
        <label style={{marginBottom:'0.5rem',display:'flex',alignItems:'center',gap:6}}>
          <i class="ti ti-key" style={{color:'var(--acc)'}}/>
          Shared keyword list
          <span class="badge b-acc" style={{fontSize:11}}>{keywords.length} keywords</span>
          {keywords.length>0&&<button onClick={clearAllKeywords} style={{border:'none',background:'none',color:'var(--err)',fontSize:12,padding:'0 4px',cursor:'pointer'}}>Clear all</button>}
        </label>
        <div style={{display:'flex',gap:6,marginBottom:'0.5rem'}}>
          <input type="text" value={newKw} onChange={e=>setNewKw(e.target.value)} placeholder="Type a keyword and press Enter..." onKeyDown={e=>{if(e.key==='Enter'){addKeyword(newKw);setNewKw('')}}} style={{flex:1}}/>
          <button class="pri" onClick={()=>{addKeyword(newKw);setNewKw('')}} disabled={!newKw.trim()} style={{padding:'8px 12px',whiteSpace:'nowrap'}}>
            <i class="ti ti-plus"/> Add
          </button>
        </div>
        {keywords.length>0?(
          <div style={{background:'var(--bg2)',borderRadius:'var(--rad)',padding:'0.75rem',minHeight:48,display:'flex',flexWrap:'wrap',gap:2}}>
            {keywords.map(k=>(
              <span key={k.id} class="kw-chip">
                {k.keyword}
                <span class="by">{k.added_by==='auto-extract'?'auto':k.added_by}</span>
                <button onClick={()=>removeKeyword(k.id)} title="Remove">×</button>
              </span>
            ))}
          </div>
        ):(
          <p style={{color:'var(--txt2)',fontSize:13,fontStyle:'italic',padding:'0.5rem 0'}}>No keywords yet — add manually or upload lecture materials below.</p>
        )}
        <div style={{marginTop:'0.5rem',fontSize:12,color:'var(--txt2)'}}>
          <i class="ti ti-cards"/> {seededCount||0} seeded · {candidateCount||0} keyword matches · est. <strong style={{color:'var(--txt1)'}}>${estimateCost(candidateCount||0)}</strong>
        </div>
      </div>

      <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'0.5px solid var(--bdr)'}}>
        <label style={{marginBottom:'0.5rem',display:'flex',alignItems:'center',gap:6}}>
          <i class="ti ti-ban" style={{color:'var(--err)'}}/>
          Exclusion keywords
          <span class="badge b-err" style={{fontSize:11}}>{(exclusionKeywords||[]).length} excluded</span>
          <span style={{fontSize:11,color:'var(--txt2)'}}>— cards containing these words are filtered out</span>
        </label>
        <div style={{display:'flex',gap:6,marginBottom:'0.5rem'}}>
          <input type="text" value={newExKw} onChange={e=>setNewExKw(e.target.value)} placeholder="Add exclusion term (e.g. pancreas, insulin)..." onKeyDown={e=>{if(e.key==='Enter'){onExclusionChange('add',newExKw,reviewer);setNewExKw('')}}} style={{flex:1}}/>
          <button class="err" onClick={()=>{onExclusionChange('add',newExKw,reviewer);setNewExKw('')}} disabled={!newExKw.trim()} style={{padding:'8px 12px',whiteSpace:'nowrap'}}>
            <i class="ti ti-plus"/> Add
          </button>
        </div>
        {(exclusionKeywords||[]).length>0&&(
          <div style={{background:'var(--errL)',borderRadius:'var(--rad)',padding:'0.75rem',display:'flex',flexWrap:'wrap',gap:2}}>
            {(exclusionKeywords||[]).map(k=>(
              <span key={k.id} style={{display:'inline-flex',alignItems:'center',gap:5,background:'#fff',color:'var(--err)',fontSize:12,padding:'3px 8px',borderRadius:20,margin:2,border:'0.5px solid var(--err)'}}>
                {k.keyword}
                <span style={{fontSize:10,opacity:.6}}>{k.added_by}</span>
                <button onClick={()=>onExclusionChange('remove',k.id)} style={{border:'none',background:'none',color:'var(--err)',padding:0,fontSize:14,cursor:'pointer',opacity:.6}}>×</button>
              </span>
            ))}
          </div>
        )}
        {(exclusionKeywords||[]).length===0&&<p style={{color:'var(--txt2)',fontSize:13,fontStyle:'italic',padding:'0.25rem 0'}}>No exclusions yet — add terms to filter out irrelevant card clusters.</p>}
      </div>

      <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'0.5px solid var(--bdr)'}}>
        <label style={{marginBottom:'0.5rem',display:'flex',alignItems:'center',gap:6}}>
          <i class="ti ti-file-text" style={{color:'var(--acc)'}}/>
          Extract keywords from lecture materials
          <span style={{fontSize:11,color:'var(--txt2)'}}>— words common across your deck are filtered out automatically</span>
        </label>
        <FileUploadZone onTextExtracted={handleFileExtract}/>
        {extractStatus&&<p style={{color:'var(--ok)',fontSize:13,marginTop:'0.5rem'}}><i class="ti ti-check"/> {extractStatus}</p>}
        <div style={{marginTop:'0.75rem'}}>
          <label style={{marginBottom:'0.25rem'}}>Or paste text directly</label>
          <PasteExtract onExtract={handleTextExtract}/>
        </div>
      </div>
    </div>
  );
}

function Review({reviewer,apiKey,lectures,setLectures,cards,completions,setCompletions,lectureReviewCounts,setLectureReviewCounts,getLectureStatus,genericWords,loadingCards,onBack}){
  const [selLec,setSelLec]=useState(null);
  const [queue,setQueue]=useState([]);
  const [reviews,setReviews]=useState({});
  const [idx,setIdx]=useState(0);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState({step:'',pct:0});
  const [filterMod,setFilterMod]=useState('all');
  const [filterStatus,setFilterStatus]=useState('all');
  const [seededCount,setSeededCount]=useState(0);
  const [candidateCount,setCandidateCount]=useState(0);
  const [showConfirm,setShowConfirm]=useState(false);
  const [editingLecId,setEditingLecId]=useState(null);
  const [editLecName,setEditLecName]=useState('');
  const [editLecMod,setEditLecMod]=useState('');
  const [exclusionKeywords,setExclusionKeywords]=useState([]);
  const [reviewTab,setReviewTab]=useState('pending');
  const [expandedCard,setExpandedCard]=useState(null);
  const modules=[...new Set(lectures.map(l=>l.module))];

  // Live queue filtered by exclusion keywords
  const visibleQueue=queue.filter(c=>{
    if(exclusionKeywords.length===0) return true;
    const text=(c.front+' '+c.back).toLowerCase();
    return !exclusionKeywords.some(ex=>text.includes(ex.keyword.toLowerCase()));
  });

  const statusCounts={
    notstarted:lectures.filter(l=>getLectureStatus(l)==='notstarted').length,
    inprogress:lectures.filter(l=>getLectureStatus(l)==='inprogress').length,
    complete:lectures.filter(l=>getLectureStatus(l)==='complete').length,
  };

  const [reviewedCards,setReviewedCards]=useState([]);

  useEffect(()=>{if(selLec){loadReviews();loadExclusionKeywords();loadQueue();loadReviewedCards();}},[selLec]);

  async function loadReviewedCards(){
    const{data}=await db.from('reviews').select('*, cards(*)').eq('lecture_id',selLec.id).order('reviewed_at',{ascending:true});
    setReviewedCards(data||[]);
  }

  async function loadExclusionKeywords(){
    const{data}=await db.from('exclusion_keywords').select('*').eq('lecture_id',selLec.id).order('added_at');
    setExclusionKeywords(data||[]);
  }

  async function handleExclusionChange(action, value, addedBy){
    if(action==='add'){
      const clean=value.trim().toLowerCase();
      if(!clean||exclusionKeywords.find(k=>k.keyword===clean)) return;
      const{data,error}=await db.from('exclusion_keywords').insert({lecture_id:selLec.id,keyword:clean,added_by:addedBy}).select().single();
      if(!error){
        const newList=[...exclusionKeywords,data];
        setExclusionKeywords(newList);
        // Adjust idx if current card is now excluded
        setIdx(i=>Math.min(i,Math.max(0,queue.filter(c=>{
          const text=(c.front+' '+c.back).toLowerCase();
          return !newList.some(ex=>text.includes(ex.keyword.toLowerCase()));
        }).length-1)));
      }
    } else if(action==='remove'){
      await db.from('exclusion_keywords').delete().eq('id',value);
      setExclusionKeywords(p=>p.filter(k=>k.id!==value));
    }
  }

  async function saveLectureEdit(id){
    if(!editLecName.trim()||!editLecMod.trim()) return;
    await db.from('lectures').update({name:editLecName,module:editLecMod}).eq('id',id);
    setLectures(p=>p.map(l=>l.id===id?{...l,name:editLecName,module:editLecMod}:l));
    if(selLec?.id===id) setSelLec(p=>({...p,name:editLecName,module:editLecMod}));
    setEditingLecId(null);
  }

  async function deleteLectureFromReview(id,name){
    if(!confirm(`Delete lecture "${name}"? This will also delete all reviews, keywords and queue items for this lecture.`)) return;
    await Promise.all([
      db.from('reviews').delete().eq('lecture_id',id),
      db.from('keywords').delete().eq('lecture_id',id),
      db.from('exclusion_keywords').delete().eq('lecture_id',id),
      db.from('lecture_completions').delete().eq('lecture_id',id),
      db.from('queue_items').delete().eq('lecture_id',id),
    ]);
    await db.from('lectures').delete().eq('id',id);
    setLectures(p=>p.filter(l=>l.id!==id));
    if(selLec?.id===id){setSelLec(null);setQueue([]);}
  }

  async function loadReviews(){
    const{data}=await db.from('reviews').select('*').eq('lecture_id',selLec.id);
    const map={};(data||[]).forEach(r=>{map[r.card_id]=r});setReviews(map);
  }

  async function loadQueue(){
    const{data}=await db.from('queue_items').select('*, cards(*)').eq('lecture_id',selLec.id).order('added_at');
    if(!data||data.length===0){setQueue([]);setIdx(0);return;}
    const q=data.map(item=>({...item.cards,confidence:item.confidence,reason:item.reason,queue_item_id:item.id}));
    setQueue(q);
    setIdx(0); // Always start at position 0 in pendingQueue
  }

  async function runAnalysis(){
    setShowConfirm(false);
    if(!apiKey){alert('Enter your Anthropic API key in setup first.');return;}
    setLoading(true);setQueue([]);setIdx(0);

    const lecTag=selLec.name.replace(/\s+/g,'_').toLowerCase();
    const seeded=cards.filter(c=>{
      const tags=(c.existing_tags||'').toLowerCase();
      return tags.includes(lecTag);
    });
    const seededIds=new Set(seeded.map(c=>c.id));

    const{data:kws}=await db.from('keywords').select('*').eq('lecture_id',selLec.id);
    const kwList=(kws||[]).map(k=>k.keyword.toLowerCase());

    const{data:exKws}=await db.from('exclusion_keywords').select('*').eq('lecture_id',selLec.id);
    const exList=(exKws||[]).map(k=>k.keyword.toLowerCase());

    const candidates=cards.filter(c=>{
      if(seededIds.has(c.id)) return false;
      const text=(c.front+' '+c.back).toLowerCase();
      if(exList.some(ex=>text.includes(ex))) return false;
      return kwList.some(kw=>text.includes(kw));
    });

    setProgress({step:`Starting deep analysis on ${candidates.length} candidates...`,pct:5});

    let finalQueue=[...seeded.map(c=>({...c,confidence:'seeded',reason:'Previously tagged for this lecture — please verify'}))];

    const DEEP=100;
    const deepChunks=[];
    for(let i=0;i<candidates.length;i+=DEEP) deepChunks.push(candidates.slice(i,i+DEEP));

    for(let ci=0;ci<deepChunks.length;ci++){
      const chunk=deepChunks[ci];
      setProgress({step:`Analyzing chunk ${ci+1} of ${deepChunks.length}...`,pct:Math.round(5+((ci+1)/Math.max(deepChunks.length,1))*90)});
      // Small delay between chunks to avoid rate limiting
      if(ci>0) await new Promise(r=>setTimeout(r,500));
      try{
        const prompt=`You are helping medical students tag Anki flashcards to the correct lecture.
LECTURE: "${selLec.name}" (Module: ${selLec.module})
${selLec.learning_objectives?`LEARNING OBJECTIVES FOR THIS LECTURE:\n${selLec.learning_objectives}\n`:''}CARDS (INDEX|FRONT|BACK):
${chunk.map((c,i)=>`${i}|${c.front}|${c.back}`).join('\n')}
For each card that would reasonably belong to this lecture return a JSON array of objects.
Each: {"index":number,"confidence":"high"|"medium"|"low","reason":"one sentence explaining why"}
Only include cards that are closely related to at least one of the learning objectives listed above. JSON array only, no markdown.`;
        const ctrl1=new AbortController();
        const t1=setTimeout(()=>ctrl1.abort(),30000);
        const res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:prompt}]}),
          signal:ctrl1.signal
        });
        clearTimeout(t1);
        const data=await res.json();
        if(data.error){
          console.warn(`Chunk ${ci+1} API error:`, data.error.message);
          continue;
        }
        const text=data.content?.[0]?.text||'[]';
        const hits=JSON.parse(text.replace(/```json|```/g,'').trim());
        hits.forEach(h=>{if(chunk[h.index]) finalQueue.push({...chunk[h.index],confidence:h.confidence,reason:h.reason})});
      }catch(e){
        console.warn(`Chunk ${ci+1} failed, skipping:`, e.message);
        // Skip failed chunks rather than dumping unreviewed cards
      }
    }

    setProgress({step:`Done. Saving ${finalQueue.length} cards to queue...`,pct:95});

    // Upsert new cards to persistent queue — existing cards are preserved due to unique constraint
    const queueItems=finalQueue.map(c=>({
      lecture_id:selLec.id,
      card_id:c.id,
      confidence:c.confidence,
      reason:c.reason
    }));
    for(let i=0;i<queueItems.length;i+=100){
      await db.from('queue_items').upsert(queueItems.slice(i,i+100),{onConflict:'lecture_id,card_id',ignoreDuplicates:true});
    }

    setProgress({step:`Done. ${finalQueue.length} cards analyzed — new ones added to queue.`,pct:100});
    await loadQueue();
    setLoading(false);
  }

  async function decide(card,decision){
    const existing=reviews[card.id];
    const payload={card_id:card.id,lecture_id:selLec.id,decision,reviewed_by:reviewer,reviewed_at:new Date().toISOString()};
    if(existing){
      await db.from('reviews').update(payload).eq('id',existing.id);
      setReviewedCards(prev=>prev.map(r=>r.card_id===card.id?{...r,decision:payload.decision,reviewed_by:payload.reviewed_by}:r));
    } else {
      const{data:inserted}=await db.from('reviews').insert(payload).select().single();
      setLectureReviewCounts(p=>({...p,[selLec.id]:(p[selLec.id]||0)+1}));
      setReviewedCards(prev=>[...prev,{...(inserted||payload),cards:card}]);
    }
    const newReviews={...reviews,[card.id]:payload};
    setReviews(newReviews);
    // Keep idx the same — the reviewed card drops out of pendingQueue so the next card slides into this position
  }

  }

  const FRAGMENT_BLOCKLIST=[
    'via the enzyme',
    'may be converted to',
  ];

  function extractSearchFragments(front){
    const clozePattern=/\{\{c\d+::.*?\}\}/g;
    const clozeMatches=[...front.matchAll(clozePattern)];

    if(clozeMatches.length===0){
      const words=front.trim().split(/\s+/).filter(w=>w).length;
      const blocked=FRAGMENT_BLOCKLIST.some(b=>front.trim().toLowerCase()===b.toLowerCase());
      return words>=4&&!blocked?[front.trim()]:[];
    }

    const wordCharPattern=/[A-Za-z0-9'-]/;
    const spans=[];
    for(const m of clozeMatches){
      let start=m.index;
      let end=m.index+m[0].length;
      while(start>0&&wordCharPattern.test(front[start-1])) start--;
      while(end<front.length&&wordCharPattern.test(front[end])) end++;
      spans.push([start,end]);
    }
    spans.sort((a,b)=>a[0]-b[0]);
    const merged=[];
    for(const [s,e] of spans){
      if(merged.length&&s<=merged[merged.length-1][1]) merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],e);
      else merged.push([s,e]);
    }
    const fragments=[];
    let pos=0;
    for(const [s,e] of merged){
      const frag=front.substring(pos,s).trim();
      if(frag) fragments.push(frag);
      pos=e;
    }
    const lastFrag=front.substring(pos).trim();
    if(lastFrag) fragments.push(lastFrag);

    const cleaned=fragments
      .map(f=>f.replace(/\s+/g,' ').replace(/^[^\w]+|[^\w]+$/g,'').trim())
      .filter(f=>f.length>0);

    // Gate: card must have at least one fragment with 4+ words that isn't on the blocklist
    const hasQualifying=cleaned.some(f=>
      f.split(/\s+/).filter(w=>w).length>=4 &&
      !FRAGMENT_BLOCKLIST.some(b=>f.toLowerCase().includes(b.toLowerCase()))
    );
    if(!hasQualifying) return [];

    // Include all non-empty fragments, but drop blocklisted ones
    return cleaned.filter(f=>!FRAGMENT_BLOCKLIST.some(b=>f.toLowerCase().includes(b.toLowerCase())));
  }

  async function exportResults(){
    if(!selLec){alert('Please select a lecture first.');return;}
    const{data}=await db.from('reviews').select('*, cards(*), lectures(*)').eq('decision','approved').eq('lecture_id',selLec.id);
    if(!data||data.length===0){alert('No approved cards for this lecture.');return;}

    const tag=`AnkiHub_Optional::VPS_MM::${selLec.module}::${selLec.name}`;
    const searchableCards=[];
    const needsManualCards=[];

    data.forEach(r=>{
      const card=r.cards;
      if(!card||!card.front) return;
      const fragments=extractSearchFragments(card.front);
      if(fragments.length===0){
        needsManualCards.push(card.front);
      } else {
        const quoted=fragments.map(f=>`"${f}"`).join(' ');
        searchableCards.push(quoted);
      }
    });

    if(searchableCards.length===0&&needsManualCards.length===0){
      alert('No approved cards with front text found.');
      return;
    }

    const searchQuery=searchableCards.join(' OR ');
    const lines=[
      `# Lecture: ${selLec.module}::${selLec.name}`,
      `# Tag to add: ${tag}`,
      `# ${searchableCards.length} cards searchable via Anki Browser search, ${needsManualCards.length} need manual tagging`,
      '',
      '',
      '################################################################',
      '# COPY EVERYTHING BETWEEN THE LINES BELOW INTO ANKI BROWSER SEARCH',
      '################################################################',
      '----------------------------------------------------------------',
      searchQuery,
      '----------------------------------------------------------------',
      '',
      '',
    ];
    if(needsManualCards.length>0){
      lines.push('################################################################');
      lines.push('# CARDS NEEDING MANUAL TAGGING');
      lines.push('# (cloze formatting covers too much of the front text to search reliably — tag these by hand)');
      lines.push('################################################################');
      lines.push('');
      needsManualCards.forEach((f,i)=>{lines.push(`${i+1}. ${f}`);lines.push('');});
    }

    const blob=new Blob([lines.join('\n')],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`${selLec.name}_search.txt`;a.click();
  }

                                  {r.decision==='approved'?'Reject':'Approve'}
                                </button>
                                <i onClick={()=>setExpandedCard({...card,confidence:null,reason:null,review:r})} class="ti ti-chevron-right" style={{color:'var(--txt2)',flexShrink:0,cursor:'pointer'}}/>
                              </>
                            ):(
                              <span style={{fontSize:13,flex:1,color:'var(--txt2)',fontStyle:'italic'}}>Card data unavailable</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Reviewed tab — expanded card */}
                  {reviewTab==='reviewed'&&expandedCard&&(
                    <div>
                      <button onClick={()=>setExpandedCard(null)} style={{border:'none',background:'none',color:'var(--acc)',padding:'0 0 1rem 0',fontSize:13,cursor:'pointer'}}>
                        <i class="ti ti-arrow-left"/> Back to list
                      </button>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.75rem'}}>
                        <span class={`badge ${expandedCard.review?.decision==='approved'?'b-ok':'b-err'}`}>
                          {expandedCard.review?.decision} by {expandedCard.review?.reviewed_by}
                        </span>
                      </div>
                      <div style={{background:'var(--bg2)',borderRadius:'var(--rad)',padding:'1rem',marginBottom:'0.75rem'}}>
                        <p style={{fontSize:11,color:'var(--txt2)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>Front</p>
                        <p style={{fontSize:15,lineHeight:1.6}}>{expandedCard.front}</p>
                      </div>
                      <div style={{background:'var(--bg2)',borderRadius:'var(--rad)',padding:'1rem',marginBottom:'0.75rem'}}>
                        <p style={{fontSize:11,color:'var(--txt2)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>Back</p>
                        <p style={{fontSize:15,lineHeight:1.6}}>{expandedCard.back}</p>
                      </div>
                      <p style={{fontSize:13,color:'var(--txt2)',marginBottom:'0.5rem'}}>Change decision:</p>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        <button class="ok" onClick={()=>{decide({...expandedCard,id:expandedCard.id},'approved');setExpandedCard(null);}} style={{padding:'10px'}}>
                          <i class="ti ti-check"/> Approve
                        </button>
                        <button class="err" onClick={()=>{decide({...expandedCard,id:expandedCard.id},'rejected');setExpandedCard(null);}} style={{padding:'10px'}}>
                          <i class="ti ti-x"/> Reject
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {visibleQueue.length===0&&!loading&&(
                <div class="card" style={{textAlign:'center',padding:'2rem',color:'var(--txt2)'}}>
                  <i class="ti ti-sparkles" style={{fontSize:32,display:'block',marginBottom:'0.5rem'}}/>
                  <p style={{fontSize:15}}>Run analysis to find relevant cards</p>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
